<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" shape-rendering="crispEdges">
  <defs>
    <!-- Red neon glow -->
    <filter id="glow-red" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Cyan glow -->
    <filter id="glow-cyan" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Soft outer glow for the frame -->
    <filter id="glow-frame" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── BACKGROUND (transparent) ── -->

  <!-- ── OUTER FRAME — clipped diamond/octagon system border ── -->
  <!-- Main dark bg tile -->
  <rect x="3" y="3" width="26" height="26" rx="2" fill="#0a0a0f" opacity="0.92"/>

  <!-- Outer frame border -->
  <rect x="3" y="3" width="26" height="26" rx="2"
        fill="none" stroke="#c0392b" stroke-width="0.9" opacity="0.85"
        filter="url(#glow-frame)"/>

  <!-- Corner tick — top-left -->
  <polyline points="3,8 3,3 8,3" stroke="#e74c3c" stroke-width="1.4" fill="none" filter="url(#glow-red)"/>
  <!-- Corner tick — top-right -->
  <polyline points="24,3 29,3 29,8" stroke="#e74c3c" stroke-width="1.4" fill="none" filter="url(#glow-red)"/>
  <!-- Corner tick — bottom-left -->
  <polyline points="3,24 3,29 8,29" stroke="#e74c3c" stroke-width="1.4" fill="none" filter="url(#glow-red)"/>
  <!-- Corner tick — bottom-right -->
  <polyline points="29,24 29,29 24,29" stroke="#e74c3c" stroke-width="1.4" fill="none" filter="url(#glow-red)"/>

  <!-- ── CENTRAL MONOGRAM STRUCTURE ── -->
  <!-- Vertical spine -->
  <rect x="15.4" y="8" width="1.2" height="16" fill="#c0392b" filter="url(#glow-red)" opacity="0.9"/>

  <!-- Horizontal crossbar — top -->
  <rect x="10" y="10.4" width="12" height="1.1" fill="#c0392b" filter="url(#glow-red)" opacity="0.85"/>

  <!-- Horizontal crossbar — mid -->
  <rect x="11" y="15.4" width="10" height="1.1" fill="#c0392b" filter="url(#glow-red)" opacity="0.75"/>

  <!-- Horizontal crossbar — bottom -->
  <rect x="10" y="20.5" width="12" height="1.1" fill="#c0392b" filter="url(#glow-red)" opacity="0.85"/>

  <!-- ── DIAGONAL SLASHES (glitch/fragmentation accent) ── -->
  <!-- Slash left -->
  <line x1="10" y1="10.4" x2="13.5" y2="21.6" stroke="#8b1a1a" stroke-width="1" opacity="0.6"/>
  <!-- Slash right -->
  <line x1="22" y1="10.4" x2="18.5" y2="21.6" stroke="#8b1a1a" stroke-width="1" opacity="0.6"/>

  <!-- ── GLITCH FRAGMENTS — displaced pixel strips ── -->
  <!-- Glitch strip 1 (cyan) — slightly offset horizontal -->
  <rect x="14" y="13" width="6" height="0.7" fill="#00eeff" opacity="0.55" transform="translate(-1.5,0)" filter="url(#glow-cyan)"/>
  <!-- Glitch strip 2 (red) — bottom area offset -->
  <rect x="16" y="18.5" width="5" height="0.6" fill="#e74c3c" opacity="0.4" transform="translate(1,0)" filter="url(#glow-red)"/>

  <!-- ── CENTER DOT — system heartbeat ── -->
  <circle cx="16" cy="16" r="1.4" fill="#e74c3c" filter="url(#glow-red)" opacity="0.95"/>
  <circle cx="16" cy="16" r="0.6" fill="#ffffff" opacity="0.85"/>

  <!-- ── MICRO CORNER DOTS ── -->
  <rect x="4.5" y="4.5" width="1.2" height="1.2" fill="#c0392b" opacity="0.5"/>
  <rect x="26.3" y="4.5" width="1.2" height="1.2" fill="#c0392b" opacity="0.5"/>
  <rect x="4.5" y="26.3" width="1.2" height="1.2" fill="#c0392b" opacity="0.5"/>
  <rect x="26.3" y="26.3" width="1.2" height="1.2" fill="#c0392b" opacity="0.5"/>

  <!-- ── SUBTLE SCAN LINE ── -->
  <rect x="3" y="16" width="26" height="0.4" fill="#ffffff" opacity="0.04"/>
</svg>
