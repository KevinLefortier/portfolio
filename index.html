<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<title>Portfolio · Kévin Lefortier</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
/* ============================================================
   VARIABLES & RESET
   ============================================================ */
:root {
  --bg-primary: #050507;
  --bg-secondary: #0a0a0f;
  --bg-card: #0d0d14;
  --bg-card-hover: #111118;
  --red: #c0392b;
  --red-bright: #e74c3c;
  --red-glow: #ff1a1a;
  --red-dim: #7b1717;
  --white: #f0ece6;
  --grey: #8a8a99;
  --grey-light: #b0b0c0;
  --border: rgba(192, 57, 43, 0.25);
  --border-bright: rgba(231, 76, 60, 0.6);
  --font-display: 'Bebas Neue', sans-serif;
  --font-mono: 'Share Tech Mono', monospace;
  --font-body: 'Inter', sans-serif;
  --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; cursor: none; }

body {
  background: var(--bg-primary);
  color: var(--white);
  font-family: var(--font-body);
  font-weight: 300;
  line-height: 1.6;
  overflow-x: hidden;
}

/* ============================================================
   CUSTOM CURSOR
   ============================================================ */
#cursor {
  position: fixed;
  width: 12px; height: 12px;
  background: var(--red-bright);
  border-radius: 50%;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%, -50%);
  transition: transform 0.1s, width 0.2s, height 0.2s, background 0.2s;
  mix-blend-mode: screen;
  box-shadow: 0 0 10px var(--red-glow), 0 0 30px rgba(255,26,26,0.3);
}
#cursor-ring {
  position: fixed;
  width: 36px; height: 36px;
  border: 1px solid rgba(192, 57, 43, 0.6);
  border-radius: 50%;
  pointer-events: none;
  z-index: 9998;
  transform: translate(-50%, -50%);
  transition: transform 0.15s ease-out, width 0.2s, height 0.2s;
}
body:has(a:hover) #cursor, body:has(button:hover) #cursor {
  width: 6px; height: 6px;
}
body:has(a:hover) #cursor-ring, body:has(button:hover) #cursor-ring {
  width: 56px; height: 56px;
  border-color: var(--red-bright);
}

/* ============================================================
   LOADING SCREEN
   ============================================================ */
#loader {
  position: fixed; inset: 0;
  background: var(--bg-primary);
  z-index: 9000;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 24px;
  transition: opacity 0.6s ease, visibility 0.6s;
}
#loader.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

.loader-text {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--red-bright);
  letter-spacing: 4px;
  text-transform: uppercase;
}
.loader-bar-wrap {
  width: 240px; height: 2px;
  background: rgba(192,57,43,0.2);
  position: relative;
  overflow: hidden;
}
.loader-bar {
  height: 100%;
  background: var(--red-bright);
  width: 0%;
  transition: width 1.8s cubic-bezier(0.4,0,0.2,1);
  box-shadow: 0 0 10px var(--red-glow);
}
.loader-code {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--red-dim);
  letter-spacing: 2px;
  opacity: 0.7;
}

/* ============================================================
   SCAN LINE OVERLAY
   ============================================================ */
.scanlines {
  position: fixed; inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.15) 2px,
    rgba(0,0,0,0.15) 4px
  );
  pointer-events: none;
  z-index: 100;
  opacity: 0.4;
}

/* ============================================================
   NOISE TEXTURE
   ============================================================ */
.noise {
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 99;
  opacity: 0.04;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
}

/* ============================================================
   NAVIGATION
   ============================================================ */
nav {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: 500;
  padding: 16px 48px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: linear-gradient(to bottom, rgba(5,5,7,0.95), transparent);
  border-bottom: 1px solid transparent;
  transition: border-color var(--transition), background var(--transition);
}
nav.scrolled {
  background: rgba(5,5,7,0.95);
  border-bottom-color: var(--border);
  backdrop-filter: blur(12px);
}
.nav-logo {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--red-bright);
  letter-spacing: 3px;
  text-decoration: none;
  text-transform: uppercase;
}
.nav-logo span { color: var(--grey); }

.nav-links {
  display: flex;
  gap: 32px;
  list-style: none;
}
.nav-links a {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--grey);
  text-decoration: none;
  letter-spacing: 3px;
  text-transform: uppercase;
  transition: color var(--transition);
  position: relative;
}
.nav-links a::after {
  content: '';
  position: absolute;
  bottom: -4px; left: 0; right: 0;
  height: 1px;
  background: var(--red-bright);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform var(--transition);
}
.nav-links a:hover { color: var(--white); }
.nav-links a:hover::after { transform: scaleX(1); }

.nav-status {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--red-bright);
  letter-spacing: 2px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.status-dot {
  width: 6px; height: 6px;
  background: var(--red-bright);
  border-radius: 50%;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 6px var(--red-glow); }
  50% { opacity: 0.3; box-shadow: none; }
}

/* ============================================================
   HERO SECTION
   ============================================================ */
#hero {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  padding: 120px 48px 80px;
}

.hero-bg {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 70% 50%, rgba(192,57,43,0.08) 0%, transparent 70%),
    radial-gradient(ellipse 40% 60% at 20% 80%, rgba(192,57,43,0.05) 0%, transparent 60%);
}

/* Animated grid */
.hero-grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(192,57,43,0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(192,57,43,0.06) 1px, transparent 1px);
  background-size: 60px 60px;
  animation: gridDrift 20s linear infinite;
  opacity: 0.5;
}
@keyframes gridDrift {
  from { transform: translateY(0); }
  to { transform: translateY(60px); }
}

/* Particle canvas */
#particles-canvas {
  position: absolute; inset: 0;
  pointer-events: none;
}

.hero-content {
  position: relative;
  z-index: 2;
  max-width: 900px;
  width: 100%;
}

.hero-label {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--red-bright);
  letter-spacing: 6px;
  text-transform: uppercase;
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 12px;
  opacity: 0;
  animation: fadeUp 0.6s 0.5s forwards;
}
.hero-label::before {
  content: '';
  width: 30px; height: 1px;
  background: var(--red-bright);
}

.hero-name {
  font-family: var(--font-display);
  font-size: clamp(64px, 10vw, 130px);
  line-height: 0.9;
  letter-spacing: 4px;
  color: var(--white);
  margin-bottom: 8px;
  opacity: 0;
  animation: fadeUp 0.7s 0.7s forwards;
  position: relative;
}
.hero-name .glitch-text {
  position: relative;
  display: inline-block;
}
.hero-name .glitch-text::before,
.hero-name .glitch-text::after {
  content: attr(data-text);
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  overflow: hidden;
}
.hero-name .glitch-text::before {
  color: var(--red-bright);
  animation: glitch1 4s infinite;
  clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%);
  transform: translate(-3px, 0);
  opacity: 0;
}
.hero-name .glitch-text::after {
  color: #00ffff;
  animation: glitch2 4s infinite;
  clip-path: polygon(0 60%, 100% 60%, 100% 100%, 0 100%);
  transform: translate(3px, 0);
  opacity: 0;
}
@keyframes glitch1 {
  0%, 92%, 100% { opacity: 0; transform: translate(0); }
  93% { opacity: 0.8; transform: translate(-4px, 2px); }
  94% { opacity: 0; transform: translate(0); }
  96% { opacity: 0.6; transform: translate(-2px, -1px); }
  97% { opacity: 0; }
}
@keyframes glitch2 {
  0%, 92%, 100% { opacity: 0; transform: translate(0); }
  93.5% { opacity: 0.6; transform: translate(4px, -2px); }
  94.5% { opacity: 0; }
  97% { opacity: 0.4; transform: translate(2px, 1px); }
  98% { opacity: 0; }
}

.hero-role {
  font-family: var(--font-display);
  font-size: clamp(28px, 4vw, 52px);
  color: var(--red-bright);
  letter-spacing: 6px;
  margin-bottom: 32px;
  opacity: 0;
  animation: fadeUp 0.7s 0.9s forwards;
}

.hero-tagline {
  font-size: 15px;
  color: var(--grey-light);
  max-width: 480px;
  line-height: 1.8;
  margin-bottom: 48px;
  font-weight: 300;
  opacity: 0;
  animation: fadeUp 0.7s 1.1s forwards;
}
.hero-tagline span { color: var(--white); }

.hero-btns {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  opacity: 0;
  animation: fadeUp 0.7s 1.3s forwards;
}

.btn-primary {
  padding: 14px 36px;
  background: var(--red);
  color: var(--white);
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  text-decoration: none;
  border: none;
  cursor: none;
  position: relative;
  overflow: hidden;
  transition: background var(--transition), box-shadow var(--transition);
  clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
}
.btn-primary::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
  opacity: 0;
  transition: opacity var(--transition);
}
.btn-primary:hover {
  background: var(--red-bright);
  box-shadow: 0 0 30px rgba(231,76,60,0.4), 0 0 60px rgba(231,76,60,0.15);
}
.btn-primary:hover::before { opacity: 1; }

.btn-secondary {
  padding: 13px 36px;
  background: transparent;
  color: var(--grey-light);
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  text-decoration: none;
  border: 1px solid var(--border);
  cursor: none;
  transition: color var(--transition), border-color var(--transition), box-shadow var(--transition);
  clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
}
.btn-secondary:hover {
  color: var(--white);
  border-color: var(--red-bright);
  box-shadow: 0 0 20px rgba(231,76,60,0.15);
}

.hero-scroll-indicator {
  position: absolute;
  bottom: 40px; left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  opacity: 0;
  animation: fadeUp 0.6s 1.8s forwards;
}
.scroll-line {
  width: 1px; height: 48px;
  background: linear-gradient(to bottom, var(--red-bright), transparent);
  animation: scrollPulse 2s infinite;
}
@keyframes scrollPulse {
  0%, 100% { opacity: 0.4; transform: scaleY(1); }
  50% { opacity: 1; transform: scaleY(1.2); }
}
.scroll-text {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--red-dim);
  letter-spacing: 3px;
  writing-mode: vertical-rl;
  text-transform: uppercase;
}

/* ============================================================
   SECTION COMMONS
   ============================================================ */
section {
  padding: 120px 48px;
  max-width: 1200px;
  margin: 0 auto;
}

.section-header {
  display: flex;
  align-items: center;
  gap: 20px;
  margin-bottom: 72px;
}
.section-number {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--red-bright);
  letter-spacing: 3px;
}
.section-line {
  width: 60px; height: 1px;
  background: var(--border);
}
.section-title {
  font-family: var(--font-display);
  font-size: clamp(36px, 5vw, 60px);
  letter-spacing: 4px;
  color: var(--white);
  line-height: 1;
}
.section-title span { color: var(--red-bright); }
.section-line-end {
  flex: 1; height: 1px;
  background: linear-gradient(to right, var(--border), transparent);
}

/* Reveal animation */
.reveal {
  opacity: 0;
  transform: translateY(30px);
  transition: opacity 0.7s ease, transform 0.7s ease;
}
.reveal.visible {
  opacity: 1;
  transform: translateY(0);
}
.reveal-delay-1 { transition-delay: 0.1s; }
.reveal-delay-2 { transition-delay: 0.2s; }
.reveal-delay-3 { transition-delay: 0.3s; }
.reveal-delay-4 { transition-delay: 0.4s; }

@keyframes fadeUp {
  to { opacity: 1; transform: translateY(0); }
  from { opacity: 0; transform: translateY(20px); }
}

/* ============================================================
   ABOUT SECTION
   ============================================================ */
#about {
  position: relative;
}
#about::before {
  content: '';
  position: absolute;
  top: 0; left: -48px; right: -48px; bottom: 0;
  background: linear-gradient(to right, rgba(192,57,43,0.03), transparent 40%);
  pointer-events: none;
}

.about-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 80px;
  align-items: center;
}

.about-visual {
  position: relative;
  aspect-ratio: 1;
  max-width: 400px;
}
.about-img-frame {
  width: 100%;
  aspect-ratio: 1;
  background: var(--bg-card);
  border: 1px solid var(--border);
  position: relative;
  overflow: hidden;
  clip-path: polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 20px 100%, 0 calc(100% - 20px));
}
.about-img-frame::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse at 30% 30%, rgba(192,57,43,0.15), transparent 60%),
    repeating-linear-gradient(45deg, transparent, transparent 20px, rgba(192,57,43,0.03) 20px, rgba(192,57,43,0.03) 21px);
}
.about-img-frame::after {
  content: attr(data-label);
  position: absolute;
  bottom: 16px; right: 16px;
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--red-dim);
  letter-spacing: 2px;
}
.about-img-inner {
  width: 100%; height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-size: 80px;
  color: var(--red-dim);
  opacity: 0.4;
  letter-spacing: 4px;
}

.about-corner {
  position: absolute;
  width: 20px; height: 20px;
  border-color: var(--red-bright);
  border-style: solid;
}
.about-corner.tl { top: -6px; left: -6px; border-width: 2px 0 0 2px; }
.about-corner.tr { top: -6px; right: -6px; border-width: 2px 2px 0 0; }
.about-corner.bl { bottom: -6px; left: -6px; border-width: 0 0 2px 2px; }
.about-corner.br { bottom: -6px; right: -6px; border-width: 0 2px 2px 0; }

.about-text p {
  font-size: 15px;
  color: var(--grey-light);
  line-height: 1.9;
  margin-bottom: 20px;
}
.about-text p strong { color: var(--white); font-weight: 500; }
.about-text p .highlight { color: var(--red-bright); font-family: var(--font-mono); font-size: 13px; }

.about-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 32px;
}
.about-tag {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--red-bright);
  border: 1px solid var(--border);
  padding: 6px 14px;
  background: rgba(192,57,43,0.05);
  transition: background var(--transition), border-color var(--transition);
}
.about-tag:hover {
  background: rgba(192,57,43,0.12);
  border-color: var(--red-bright);
}

/* ============================================================
   SKILLS SECTION
   ============================================================ */
#skills {
  background: var(--bg-secondary);
  max-width: 100%;
  padding: 120px;
}
#skills > * { max-width: 1200px; margin-left: auto; margin-right: auto; }
#skills .section-header { max-width: 1200px; }

.skills-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
  max-width: 1200px;
  margin: 0 auto;
}

.skill-category {
  background: var(--bg-card);
  border: 1px solid var(--border);
  padding: 32px;
  position: relative;
  overflow: hidden;
  transition: border-color var(--transition), box-shadow var(--transition);
  clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 0 100%);
}
.skill-category::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(to right, var(--red-bright), transparent);
}
.skill-category:hover {
  border-color: var(--border-bright);
  box-shadow: 0 0 40px rgba(192,57,43,0.08), inset 0 0 40px rgba(192,57,43,0.02);
}

.skill-cat-label {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--red-bright);
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.skill-cat-label::before {
  content: '';
  width: 4px; height: 4px;
  background: var(--red-bright);
  transform: rotate(45deg);
}

.skill-item {
  margin-bottom: 20px;
}
.skill-item:last-child { margin-bottom: 0; }

.skill-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.skill-name {
  font-size: 13px;
  color: var(--grey-light);
  font-family: var(--font-mono);
  font-size: 12px;
}
.skill-pct {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--red-bright);
  letter-spacing: 1px;
}

.skill-bar-track {
  height: 3px;
  background: rgba(255,255,255,0.05);
  position: relative;
  overflow: hidden;
}
.skill-bar-fill {
  height: 100%;
  background: linear-gradient(to right, var(--red-dim), var(--red-bright));
  width: 0%;
  transition: width 1.2s cubic-bezier(0.4,0,0.2,1);
  position: relative;
}
.skill-bar-fill::after {
  content: '';
  position: absolute;
  right: 0; top: -2px;
  width: 6px; height: 6px;
  background: var(--red-bright);
  border-radius: 50%;
  box-shadow: 0 0 8px var(--red-glow);
  transform: translateX(50%);
}

/* ============================================================
   PROJECTS SECTION
   ============================================================ */
#projects {
  position: relative;
}

.projects-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 20px;
}

.project-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  padding: 32px;
  position: relative;
  overflow: hidden;
  transition: transform var(--transition), border-color var(--transition), box-shadow var(--transition);
  cursor: none;
}
.project-card::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 100%, rgba(192,57,43,0.12), transparent 70%);
  opacity: 0;
  transition: opacity var(--transition);
}
.project-card::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(to right, transparent, var(--red-bright), transparent);
  transform: scaleX(0);
  transition: transform 0.4s ease;
}
.project-card:hover {
  transform: translateY(-6px);
  border-color: var(--border-bright);
  box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 40px rgba(192,57,43,0.1);
}
.project-card:hover::before { opacity: 1; }
.project-card:hover::after { transform: scaleX(1); }

.project-id {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--red-dim);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.project-id::before {
  content: '//';
  color: var(--red-bright);
  opacity: 0.6;
}

.project-title {
  font-family: var(--font-display);
  font-size: 28px;
  letter-spacing: 3px;
  color: var(--white);
  margin-bottom: 12px;
  line-height: 1;
}

.project-desc {
  font-size: 13px;
  color: var(--grey);
  line-height: 1.8;
  margin-bottom: 24px;
  font-weight: 300;
}

.project-stack {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 24px;
}
.stack-tag {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--grey);
  border: 1px solid rgba(255,255,255,0.08);
  padding: 4px 10px;
  letter-spacing: 1px;
  background: rgba(255,255,255,0.02);
  transition: color var(--transition), border-color var(--transition);
}
.project-card:hover .stack-tag {
  color: var(--grey-light);
  border-color: rgba(192,57,43,0.3);
}

.project-links {
  display: flex;
  gap: 16px;
}
.project-link {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  text-decoration: none;
  color: var(--grey);
  transition: color var(--transition);
  display: flex;
  align-items: center;
  gap: 6px;
}
.project-link::before {
  content: '→';
  color: var(--red-bright);
  transition: transform var(--transition);
}
.project-link:hover { color: var(--white); }
.project-link:hover::before { transform: translateX(4px); }

.project-featured {
  grid-column: 1 / -1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
  padding: 0;
  overflow: hidden;
}
.project-featured .project-img {
  background: linear-gradient(135deg, rgba(192,57,43,0.2), rgba(5,5,7,0.8)),
              repeating-linear-gradient(45deg, transparent, transparent 20px, rgba(192,57,43,0.04) 20px, rgba(192,57,43,0.04) 21px);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-size: 100px;
  color: rgba(192,57,43,0.2);
  letter-spacing: 6px;
  border-right: 1px solid var(--border);
}
.project-featured .project-info {
  padding: 40px;
}

/* ============================================================
   EXPERIENCE / TIMELINE
   ============================================================ */
#experience {
  background: var(--bg-secondary);
  max-width: 100%;
  padding: 120px;
}

.timeline {
  position: relative;
  max-width: 800px;
  margin: 0 auto;
}
.timeline::before {
  content: '';
  position: absolute;
  left: 24px; top: 0; bottom: 0;
  width: 1px;
  background: linear-gradient(to bottom, var(--red-bright), var(--red-dim), transparent);
}

.timeline-item {
  display: grid;
  grid-template-columns: 56px 1fr;
  gap: 32px;
  margin-bottom: 48px;
  position: relative;
}
.timeline-dot {
  width: 10px; height: 10px;
  background: var(--red-bright);
  border-radius: 50%;
  margin-top: 6px;
  margin-left: 20px;
  position: relative;
  box-shadow: 0 0 12px var(--red-glow);
  flex-shrink: 0;
}
.timeline-dot::after {
  content: '';
  position: absolute;
  inset: -4px;
  border: 1px solid rgba(231,76,60,0.3);
  border-radius: 50%;
  animation: dotPulse 3s infinite;
}
@keyframes dotPulse {
  0%, 100% { transform: scale(1); opacity: 0.3; }
  50% { transform: scale(1.5); opacity: 0; }
}

.timeline-content {
  background: var(--bg-card);
  border: 1px solid var(--border);
  padding: 28px;
  position: relative;
  clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 0 100%);
  transition: border-color var(--transition);
}
.timeline-content:hover { border-color: var(--border-bright); }

.timeline-date {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--red-bright);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.timeline-role {
  font-family: var(--font-display);
  font-size: 22px;
  letter-spacing: 2px;
  color: var(--white);
  margin-bottom: 4px;
}
.timeline-company {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--grey);
  letter-spacing: 2px;
  margin-bottom: 16px;
}
.timeline-desc {
  font-size: 13px;
  color: var(--grey);
  line-height: 1.8;
  font-weight: 300;
}

/* ============================================================
   CONTACT SECTION
   ============================================================ */
#contact {
  position: relative;
  text-align: center;
  overflow: hidden;
}
#contact::before {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 600px; height: 600px;
  background: radial-gradient(ellipse, rgba(192,57,43,0.06), transparent 70%);
  pointer-events: none;
}

.contact-inner {
  position: relative;
  z-index: 1;
}

.contact-headline {
  font-family: var(--font-display);
  font-size: clamp(40px, 6vw, 80px);

  color: var(--white);
  margin-bottom: 16px;

}
.contact-sub {

  font-family: var(--font-mono);
}

.contact-links {
  display: flex;
  justify-content: center;
  gap: 24px;
  flex-wrap: wrap;
  margin-bottom: 56px;
}
.contact-link {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--grey);
  text-decoration: none;
  text-transform: uppercase;
  padding: 14px 28px;
  border: 1px solid var(--border);
  transition: color var(--transition), border-color var(--transition), box-shadow var(--transition), background var(--transition);
  background: rgba(5,5,7,0.5);
}
.contact-link:hover {
  color: var(--white);
  border-color: var(--red-bright);
  background: rgba(192,57,43,0.05);
  box-shadow: 0 0 30px rgba(192,57,43,0.1);
}
.contact-link svg { width: 14px; height: 14px; fill: currentColor; }

.contact-email {
  font-family: var(--font-display);
  font-size: clamp(20px, 3vw, 36px);
  letter-spacing: 4px;
  color: var(--white);
  text-decoration: none;
  display: inline-block;
  padding-bottom: 4px;
  border-bottom: 1px solid var(--border);
  transition: color var(--transition), border-color var(--transition);
}
.contact-email:hover {
  color: var(--red-bright);
  border-color: var(--red-bright);
}

/* ============================================================
   FOOTER
   ============================================================ */
footer {
  padding: 32px 48px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--grey);
  letter-spacing: 2px;
}
footer .footer-logo { color: var(--red-bright); }
footer a { color: var(--grey); text-decoration: none; transition: color var(--transition); }
footer a:hover { color: var(--red-bright); }

/* ============================================================
   BACK TO TOP
   ============================================================ */
#back-top {
  position: fixed;
  bottom: 40px; right: 48px;
  width: 44px; height: 44px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: none;
  opacity: 0;
  transform: translateY(20px);
  transition: opacity var(--transition), transform var(--transition), border-color var(--transition), box-shadow var(--transition);
  z-index: 400;
  clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 0 100%);
}
#back-top.visible { opacity: 1; transform: translateY(0); }
#back-top:hover {
  border-color: var(--red-bright);
  box-shadow: 0 0 20px rgba(192,57,43,0.2);
}
#back-top svg { width: 14px; height: 14px; stroke: var(--red-bright); fill: none; stroke-width: 2; }

/* ============================================================
   GLITCH ON CLICK
   ============================================================ */
.glitch-overlay {
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 9998;
  opacity: 0;
}
.glitch-overlay.active {
  animation: glitchFlash 0.4s forwards;
}
@keyframes glitchFlash {
  0% { opacity: 0; background: transparent; }
  10% { opacity: 1; background: rgba(192,57,43,0.05); }
  15% { opacity: 0; }
  20% { opacity: 1; background: rgba(0,255,255,0.03); transform: translateX(-4px); }
  25% { opacity: 0; transform: translateX(0); }
  100% { opacity: 0; }
}

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width: 900px) {
  nav { padding: 16px 24px; }
  .nav-links { display: none; }
  section { padding: 80px 24px; }
  #skills, #experience { padding: 80px 24px; }
  .about-grid { grid-template-columns: 1fr; }
  .about-visual { max-width: 280px; }
  .skills-grid { grid-template-columns: 1fr; }
  .project-featured { grid-template-columns: 1fr; }
  .project-featured .project-img { display: none; }
  footer { flex-direction: column; gap: 12px; text-align: center; }
}

/* ============================================================

   ============================================================ */
.divider {
  width: 100%;
  height: 1px;
  background: linear-gradient(to right, transparent, var(--border), transparent);
  margin: 0;

<script>
(function buildDOM() {
  
  document.getElementById('nav-logo').textContent = DATA.nameShort;
  document.getElementById('nav-status').textContent = DATA.status;
  const navLinks = document.getElementById('nav-links');
  DATA.nav.forEach(item => {
    const li = document.createElement('li');
    li.innerHTML = `<a href="${item.href}">${item.label}</a>`;
    navLinks.appendChild(li);
  });

  document.getElementById('hero-label').textContent = 'SYSTEM ONLINE // PORTFOLIO v2.0';
  const heroNameEl = document.getElementById('hero-name');
  heroNameEl.textContent = DATA.name;
  heroNameEl.setAttribute('data-text', DATA.name);
  document.getElementById('hero-role').textContent = DATA.role;
  document.getElementById('hero-tagline').innerHTML = DATA.tagline;

  document.getElementById('about-img-frame').setAttribute('data-label', DATA.aboutLabel);
  document.getElementById('about-img-inner').textContent = DATA.nameShort;
  const paras = document.getElementById('about-paragraphs');
  DATA.about.forEach(p => {
    const el = document.createElement('p');
    el.innerHTML = p;
    paras.appendChild(el);
  });
  const tagsEl = document.getElementById('about-tags');
  DATA.aboutTags.forEach(tag => {
    const span = document.createElement('span');
    span.className = 'about-tag';
    span.textContent = tag;
    tagsEl.appendChild(span);
  });

  const skillsGrid = document.getElementById('skills-grid');
  Object.values(DATA.skills).forEach((cat, catIdx) => {
    const div = document.createElement('div');
    div.className = `skill-category reveal reveal-delay-${catIdx + 1}`;
    let html = `<div class="skill-cat-label">${cat.label}</div>`;
    cat.items.forEach(skill => {
      html += `
        <div class="skill-item">
          <div class="skill-header">
            <span class="skill-name">${skill.name}</span>
            <span class="skill-pct">${skill.pct}%</span>
          </div>
          <div class="skill-bar-track">
            <div class="skill-bar-fill" data-pct="${skill.pct}"></div>
          </div>
        </div>`;
    });
    div.innerHTML = html;
    skillsGrid.appendChild(div);
  });

  const projGrid = document.getElementById('projects-grid');
  DATA.projects.forEach((proj, i) => {
    const div = document.createElement('div');
    div.className = `project-card reveal reveal-delay-${(i % 3) + 1}${proj.featured ? ' project-featured' : ''}`;
    const stackHtml = proj.stack.map(s => `<span class="stack-tag">${s}</span>`).join('');
    if (proj.featured) {
      div.innerHTML = `
        <div class="project-img">${proj.title.substring(0,2)}</div>
        <div class="project-info">
          <div class="project-id">${proj.id} · FEATURED</div>
          <div class="project-title">${proj.title}</div>
          <p class="project-desc">${proj.desc}</p>
          <div class="project-stack">${stackHtml}</div>
          <div class="project-links">
            <a href="${proj.github}" class="project-link">GitHub</a>
            <a href="${proj.live}" class="project-link">Live Demo</a>
          </div>
        </div>`;
    } else {
      div.innerHTML = `
        <div class="project-id">${proj.id}</div>
        <div class="project-title">${proj.title}</div>
        <p class="project-desc">${proj.desc}</p>
        <div class="project-stack">${stackHtml}</div>
      `;
    }
    projGrid.appendChild(div);
  });

  const timeline = document.getElementById('timeline');
  DATA.experience.forEach((exp, i) => {
    const div = document.createElement('div');
    div.className = `timeline-item reveal reveal-delay-${(i % 2) + 1}`;
    div.innerHTML = `
      <div class="timeline-dot"></div>
      <div class="timeline-content">
        <div class="timeline-date">${exp.date}</div>
        <div class="timeline-role">${exp.role}</div>
        <div class="timeline-company">${exp.company}</div>
        <p class="timeline-desc">${exp.desc}</p>
      </div>`;
    timeline.appendChild(div);
  });

  document.getElementById('contact-headline').textContent = DATA.contact.headline;
  document.getElementById('contact-sub').textContent = DATA.contact.sub;
  document.getElementById('contact-email').textContent = DATA.contact.email;

/* ============================================================
                        CUSTOM CURSOR
   ============================================================ */
(function initCursor() {
  const cursor = document.getElementById('cursor');
  const ring = document.getElementById('cursor-ring');
  let mx = 0, my = 0, rx = 0, ry = 0;

  document.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    cursor.style.left = mx + 'px';
    cursor.style.top = my + 'px';
  });

  function animateRing() {
    rx += (mx - rx) * 0.12;
    ry += (my - ry) * 0.12;
    ring.style.left = rx + 'px';
    ring.style.top = ry + 'px';
    requestAnimationFrame(animateRing);
  }
  animateRing();
})();

/* ============================================================
                        LOADING SCREEN
   ============================================================ */
(function initLoader() {
  const bar = document.getElementById('loader-bar');
  const pct = document.getElementById('loader-pct');
  const codeEl = document.getElementById('loader-code');
  const messages = [
    'INITIALIZING SYSTEM...',
    'LOADING ASSETS...',
    'COMPILING MODULES...',
    'ESTABLISHING CONNECTION...',
    'SYSTEM ONLINE.'
  ];

  let current = 0;
  const interval = setInterval(() => {
    current += Math.random() * 20 + 5;
    if (current > 100) current = 100;
    bar.style.width = current + '%';
    pct.textContent = Math.floor(current) + '%';
    const msgIdx = Math.floor((current / 100) * messages.length);
    codeEl.textContent = messages[Math.min(msgIdx, messages.length - 1)];
    if (current >= 100) {
      clearInterval(interval);
      setTimeout(() => document.getElementById('loader').classList.add('hidden'), 400);
    }
  }, 80);
})();

/* ============================================================
                    NAV SCROLL EFFECT
   ============================================================ */
const nav = document.getElementById('nav');
const backTop = document.getElementById('back-top');
window.addEventListener('scroll', () => {
  if (window.scrollY > 80) {
    nav.classList.add('scrolled');
    backTop.classList.add('visible');
  } else {
    nav.classList.remove('scrolled');
    backTop.classList.remove('visible');
  }
});

/* ============================================================
      INTERSECTION OBSERVER — Reveal animations + Skill bars
   ============================================================ */
(function initReveal() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        // Animate skill bars
        entry.target.querySelectorAll('.skill-bar-fill').forEach(bar => {
          bar.style.width = bar.dataset.pct + '%';
        });
      }
    });
  }, { threshold: 0.1, rootMargin: '0px 0px -60px 0px' });

  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
})();

/* ============================================================
                          PARTICLE SYSTEM
   ============================================================ */
(function initParticles() {
  const canvas = document.getElementById('particles-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles;

  function resize() {
    W = canvas.width = canvas.offsetWidth;
    H = canvas.height = canvas.offsetHeight;
  }
  resize();
  window.addEventListener('resize', () => { resize(); initP(); });

  function randomParticle() {
    return {
      x: Math.random() * W,
      y: Math.random() * H,
      vx: (Math.random() - 0.5) * 0.4,
      vy: (Math.random() - 0.5) * 0.4,
      r: Math.random() * 1.5 + 0.3,
      alpha: Math.random() * 0.5 + 0.1
    };
  }

  function initP() {
    particles = Array.from({ length: 80 }, randomParticle);
  }
  initP();

  function draw() {
    ctx.clearRect(0, 0, W, H);
    particles.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      if (p.x < 0) p.x = W;
      if (p.x > W) p.x = 0;
      if (p.y < 0) p.y = H;
      if (p.y > H) p.y = 0;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(192, 57, 43, ${p.alpha})`;
      ctx.fill();
    });

    // Draw connections
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 100) {
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = `rgba(192, 57, 43, ${0.05 * (1 - dist / 100)})`;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

/* ============================================================
                      SMOOTH NAV SCROLLING
   ============================================================ */
document.querySelectorAll('a[href^="#"]').forEach(a => {
  a.addEventListener('click', e => {
    const target = document.querySelector(a.getAttribute('href'));
    if (target) {
      e.preventDefault();
      target.scrollIntoView({ behavior: 'smooth' });
    }
  });
});
