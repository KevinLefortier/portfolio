                        CUSTOM CURSOR
   ============================================================ */
(function initCursor() {
  const cursor = document.getElementById('cursor');
  const ring = document.getElementById('cursor-ring');
  let mx = 0, my = 0, rx = 0, ry = 0;

  document.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    cursor.style.left = mx + 'px';
    cursor.style.top = my + 'px';
  });

  function animateRing() {
    rx += (mx - rx) * 0.12;
    ry += (my - ry) * 0.12;
    ring.style.left = rx + 'px';
    ring.style.top = ry + 'px';
    requestAnimationFrame(animateRing);
  }
  animateRing();
})();

/* ============================================================
                        LOADING SCREEN
   ============================================================ */
(function initLoader() {
  const bar = document.getElementById('loader-bar');
  const pct = document.getElementById('loader-pct');
  const codeEl = document.getElementById('loader-code');
  const messages = [
    'INITIALIZING SYSTEM...',
    'LOADING ASSETS...',
    'COMPILING MODULES...',
    'ESTABLISHING CONNECTION...',
    'SYSTEM ONLINE.'
  ];

  let current = 0;
  const interval = setInterval(() => {
    current += Math.random() * 20 + 5;
    if (current > 100) current = 100;
    bar.style.width = current + '%';
    pct.textContent = Math.floor(current) + '%';
    const msgIdx = Math.floor((current / 100) * messages.length);
    codeEl.textContent = messages[Math.min(msgIdx, messages.length - 1)];
    if (current >= 100) {
      clearInterval(interval);
      setTimeout(() => document.getElementById('loader').classList.add('hidden'), 400);
    }
  }, 80);
})();

/* ============================================================
                    NAV SCROLL EFFECT
   ============================================================ */
const nav = document.getElementById('nav');
const backTop = document.getElementById('back-top');
window.addEventListener('scroll', () => {
  if (window.scrollY > 80) {
    nav.classList.add('scrolled');
    backTop.classList.add('visible');
  } else {
    nav.classList.remove('scrolled');
    backTop.classList.remove('visible');
  }
});

/* ============================================================
      INTERSECTION OBSERVER — Reveal animations + Skill bars
   ============================================================ */
(function initReveal() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        // Animate skill bars
        entry.target.querySelectorAll('.skill-bar-fill').forEach(bar => {
          bar.style.width = bar.dataset.pct + '%';
        });
      }
    });
  }, { threshold: 0.1, rootMargin: '0px 0px -60px 0px' });

  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
})();

/* ============================================================
                          PARTICLE SYSTEM
   ============================================================ */
(function initParticles() {
  const canvas = document.getElementById('particles-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles;

  function resize() {
    W = canvas.width = canvas.offsetWidth;
    H = canvas.height = canvas.offsetHeight;
  }
  resize();
  window.addEventListener('resize', () => { resize(); initP(); });

  function randomParticle() {
    return {
      x: Math.random() * W,
      y: Math.random() * H,
      vx: (Math.random() - 0.5) * 0.4,
      vy: (Math.random() - 0.5) * 0.4,
      r: Math.random() * 1.5 + 0.3,
      alpha: Math.random() * 0.5 + 0.1
    };
  }

  function initP() {
    particles = Array.from({ length: 80 }, randomParticle);
  }
  initP();

  function draw() {
    ctx.clearRect(0, 0, W, H);
    particles.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      if (p.x < 0) p.x = W;
      if (p.x > W) p.x = 0;
      if (p.y < 0) p.y = H;
      if (p.y > H) p.y = 0;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(192, 57, 43, ${p.alpha})`;
      ctx.fill();
    });

    // Draw connections
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 100) {
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = `rgba(192, 57, 43, ${0.05 * (1 - dist / 100)})`;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

/* ============================================================
                      SMOOTH NAV SCROLLING
   ============================================================ */
document.querySelectorAll('a[href^="#"]').forEach(a => {
  a.addEventListener('click', e => {
    const target = document.querySelector(a.getAttribute('href'));
    if (target) {
      e.preventDefault();
      target.scrollIntoView({ behavior: 'smooth' });
    }
  });
});
